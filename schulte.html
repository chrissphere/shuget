<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="记忆训练">
  <meta name="theme-color" content="#4A7CFF">
  <title>舒尔特方格</title>
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 主页 -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <a href="index.html" class="btn-nav-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      首页
    </a>
    <h1 class="app-title">舒尔特方格</h1>
    <p class="app-subtitle">专注力训练</p>
  </div>

  <div class="size-selector">
    <p class="section-label">选择难度</p>
    <div class="size-buttons">
      <button class="size-btn" data-size="3">
        <span class="size-num">3×3</span>
        <span class="size-tag">入门</span>
      </button>
      <button class="size-btn" data-size="4">
        <span class="size-num">4×4</span>
        <span class="size-tag">简单</span>
      </button>
      <button class="size-btn" data-size="5">
        <span class="size-num">5×5</span>
        <span class="size-tag">经典</span>
      </button>
      <button class="size-btn" data-size="6">
        <span class="size-num">6×6</span>
        <span class="size-tag">困难</span>
      </button>
      <button class="size-btn" data-size="7">
        <span class="size-num">7×7</span>
        <span class="size-tag">专家</span>
      </button>
    </div>
  </div>

  <div class="setting-row">
    <span class="setting-label">分区辅助</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggle-zone">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="setting-row">
    <span class="setting-label">分区加深</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggle-zone-deep">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="setting-row">
    <span class="setting-label">起始数字</span>
    <input type="number" id="input-start-num" class="num-input" min="1" max="9999" value="1">
  </div>

  <div class="setting-row">
    <span class="setting-label">逐格延迟</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggle-stagger">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="setting-row" id="row-stagger-delay" style="display:none;">
    <span class="setting-label">延迟间隔</span>
    <div style="display:flex;align-items:center;gap:6px;">
      <input type="number" id="input-stagger-delay" class="num-input" min="12" max="240" step="12" value="12">
      <span style="font-size:13px;color:var(--text-secondary);">ms</span>
    </div>
  </div>

  <div class="stats-card" id="home-stats">
    <div class="stat-item">
      <span class="stat-value" id="stat-best">--</span>
      <span class="stat-label">最佳成绩</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value" id="stat-avg">--</span>
      <span class="stat-label">平均成绩</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value" id="stat-count">0</span>
      <span class="stat-label">完成次数</span>
    </div>
  </div>

  <button class="btn-start" id="btn-start">开始训练</button>
  <div class="tip-text">盯住屏幕中心，用余光找数字</div>
</div>

<!-- 游戏页 -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <button class="btn-back" id="btn-back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="timer-display" id="timer-display">0.0</div>
    <div class="game-size-label" id="game-size-label">5×5</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div id="shuffle-speed-row" style="display:none;align-items:center;gap:10px;margin-bottom:8px;">
    <input type="range" id="shuffle-speed" class="speed-slider" min="0.5" max="3" step="0.5" value="2">
    <span id="shuffle-speed-label" class="speed-label">2s</span>
  </div>

  <button class="btn-refresh" id="btn-auto-shuffle" title="自动洗牌">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <polyline points="16 3 21 3 21 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="4" y1="20" x2="21" y2="3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <polyline points="21 16 21 21 16 21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="15" y1="15" x2="4" y2="4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </button>

  <button class="btn-refresh" id="btn-refresh" title="重新开始">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M1 4v6h6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3.51 15a9 9 0 1 0 .49-4.65" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- 结果页 -->
<div id="screen-result" class="screen">
  <div class="result-content">
    <div class="result-icon">🎉</div>
    <div class="result-time" id="result-time">25.3s</div>
    <div class="result-label">完成时间</div>

    <div class="result-stats">
      <div class="result-stat-item">
        <span class="result-stat-val" id="result-best">--</span>
        <span class="result-stat-lbl">最佳</span>
      </div>
      <div class="result-stat-item">
        <span class="result-stat-val" id="result-rank">--</span>
        <span class="result-stat-lbl">排名提示</span>
      </div>
    </div>

    <button class="btn-start" id="btn-again">再来一次</button>
    <button class="btn-outline" id="btn-home">返回主页</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
